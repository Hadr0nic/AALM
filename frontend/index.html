<!DOCTYPE html>
<html>
<head>
    <title>AALM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<h2>Real-Time Event Stream</h2>

<canvas id="chart"></canvas>

<script>
const MAX_POINTS = 50;

// Chart setup
const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Events",
            data: [],
            borderColor: "blue",
            tension: 0.3,
            pointRadius: 2
        }]
    },
    options: {
        animation: {
            duration: 150
        },
        responsive: true,
        maintainAspectRatio: true
    }
});

// WebSocket logic
function connectWS() {
    const ws = new WebSocket(
        (location.protocol === "https:" ? "wss://" : "ws://") +
        location.host +
        "/ws/events"
    );

    ws.onopen = () => {
        console.log("WS OPEN");
    };

    ws.onmessage = (msg) => {
        console.log("WS RAW:", msg.data);

        let e;
        try {
            e = JSON.parse(msg.data);
        } catch (err) {
            console.error("Invalid JSON:", err);
            return;
        }

        console.log("PARSED:", e);

        // ignore non-event messages if any
        if (!e.timestamp || e.value === undefined) return;

        chart.data.labels.push(
            new Date(e.timestamp * 1000).toLocaleTimeString()
        );

        chart.data.datasets[0].data.push(e.value);

        // keep fixed window size
        if (chart.data.labels.length > MAX_POINTS) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }

        chart.update();
    };

    ws.onerror = (err) => {
        console.log("WS ERROR:", err);
    };

    ws.onclose = () => {
        console.log("WS CLOSED — reconnecting...");
        setTimeout(connectWS, 1000);
    };
}

// start connection
connectWS();
</script>

</body>
</html>
